data:
  industries: data/industries.csv
  regions: data/regions.csv
  segments: data/segments.csv
  output: output
logs:
  path: logs
  level: INFO
prompts:
  path: prompts
LLM:
  config:
    - name: gigachat
      client-id: ${GIGA_CLIENT_ID}
      client-secret: ${GIGA_CLIENT_SECRET}
      auth: https://ngw.devices.sberbank.ru:9443/api/v2/oauth
      api: https://gigachat.devices.sberbank.ru/api/v1
#      model: GigaChat-2
      model: GigaChat-2-Pro
#      model: GigaChat-2-Max
      enabled: true
    - name: deepseek
      api-key: ${DEEPSEEK_API_KEY}
      api: https://api.deepseek.com
      model: deepseek-v4-flash
#      model: deepseek-v4-pro
      enabled: true
    - name: openai
      api-key: ${OPENAI_API_KEY}
      api: https://api.openai.com/v1
      model: gpt-5.4-mini
#      model: gpt-5.4
#      model: gpt-5.5
      enabled: true
